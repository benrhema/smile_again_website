{% extends 'base.html' %}

{% block extra_css %}
<style>
    #splash-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #hero-content, #global-nav { opacity: 0; }
</style>
{% endblock %}

{% block content %}
<div id="splash-screen">
    <div id="splash-logo" class="text-8xl font-black yellow-brand italic scale-0">SAO</div>
    <div id="splash-line" class="w-0 h-1 bg-yellow-brand mt-4"></div>
</div>

<main id="hero-content" class="relative z-10 min-h-screen px-8 md:px-20 py-24 flex flex-col justify-center">
    <h1 class="text-7xl md:text-9xl font-black italic uppercase tracking-tighter leading-none">
        Empowering <br><span class="yellow-brand">Lives.</span>
    </h1>
    <p class="mt-10 text-gray-400 max-w-xl text-lg font-light leading-relaxed">
        Sustainable community development through innovation and compassion for those who need it most.
    </p>
    <div class="mt-12 flex gap-6">
        <button class="bg-yellow-brand text-black px-12 py-4 font-black uppercase text-sm">Discover Our Mission</button>
    </div>
</main>
{% endblock %}

{% block extra_js %}
<script>
    const tl = gsap.timeline();
    tl.to("#splash-logo", { scale: 1, duration: 1, ease: "back.out(1.7)" })
      .to("#splash-line", { width: "200px", duration: 0.8, ease: "power2.inOut" })
      .to("#splash-screen", { y: "-100%", duration: 1, ease: "power4.inOut", delay: 1 })
      .to("#global-nav, #hero-content", { opacity: 1, y: -20, duration: 1, stagger: 0.3 }, "-=0.5");
</script>
{% endblock %}
