{% extends 'base.html' %}
{% block content %}
<div class="bg-black text-white min-h-[70vh] flex items-center justify-center text-center p-6">
    <div class="max-w-2xl">
        <div class="text-yellow-400 text-8xl mb-8">✓</div>
        
        <h1 class="text-6xl font-black uppercase italic mb-4">SUBMISSION <span class="text-white">RECEIVED</span></h1>
        
        <p class="text-gray-400 text-lg font-bold uppercase tracking-widest mb-12">
            Thank you! We have successfully received your donation details.<br>
            Our team will reach out to you shortly to finalize the process.
        </p>

        <div class="flex flex-col md:flex-row gap-4 justify-center">
            <a href="{% url 'home' %}" class="bg-yellow-400 text-black px-12 py-4 font-black uppercase italic hover:bg-white transition-all">
                Return to Home
            </a>
            <a href="{% url 'donate' %}" class="border border-white/20 text-white px-12 py-4 font-black uppercase italic hover:border-yellow-400 transition-all">
                Make another donation
            </a>
        </div>
    </div>
</div>
{% endblock %}
